services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DATABASE: todo_app
      AMAP_KEY: ${AMAP_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://todo.example.com}
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:80"
    depends_on:
      - backend

volumes:
  mongo_data:
